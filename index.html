<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ארט-ווד | ריהוט יוקרה ישראלי</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Heebo', sans-serif;
      background-color: #0a0a0a;
      color: #f0ece4;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 200px 200px;
    }

    /* Scroll animations */
    .fade-in {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .fade-in-delay-1 { transition-delay: 0.1s; }
    .fade-in-delay-2 { transition-delay: 0.2s; }
    .fade-in-delay-3 { transition-delay: 0.3s; }
    .fade-in-delay-4 { transition-delay: 0.4s; }

    /* Gold ambient orbs */
    .gold-orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(90px);
      will-change: transform;
    }
    @keyframes orb1 {
      0%,100% { transform: translate(0,0) scale(1); }
      40%     { transform: translate(4vw,-6vh) scale(1.12); }
      70%     { transform: translate(-3vw,4vh) scale(0.92); }
    }
    @keyframes orb2 {
      0%,100% { transform: translate(0,0) scale(1); }
      30%     { transform: translate(-5vw,5vh) scale(1.08); }
      65%     { transform: translate(4vw,-3vh) scale(0.95); }
    }
    @keyframes orb3 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%     { transform: translate(3vw,6vh) scale(1.1); }
    }
    @keyframes orb4 {
      0%,100% { transform: translate(0,0) scale(1); }
      45%     { transform: translate(-4vw,-5vh) scale(1.06); }
    }
    @keyframes orb5 {
      0%,100% { transform: translate(0,0) scale(1); }
      55%     { transform: translate(5vw,3vh) scale(0.9); }
    }

    /* Nav */
    .nav-blur {
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      background: rgba(10, 10, 10, 0.85);
      border-bottom: 1px solid rgba(201, 168, 76, 0.15);
    }

    /* Product card hover */
    .product-card {
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }
    .product-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
    }
    .product-card:hover img {
      transform: scale(1.05);
    }
    .product-card .overlay {
      position: absolute;
      inset: 0;
      background: rgba(10, 10, 10, 0);
      display: flex;
      align-items: flex-end;
      padding: 1.25rem;
      transition: background 0.4s ease, box-shadow 0.4s ease;
      box-shadow: inset 0 0 0 0px #c9a84c;
    }
    .product-card:hover .overlay {
      background: rgba(10, 10, 10, 0.65);
      box-shadow: inset 0 0 0 2px #c9a84c;
    }
    .product-card .product-name {
      color: #c9a84c;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .product-card:hover .product-name {
      opacity: 1;
      transform: translateY(0);
    }

    /* Gallery grid */
    .gallery-masonry {
      display: grid;
      grid-template-columns: 1fr;
      grid-auto-rows: 280px;
      gap: 10px;
    }
    @media (min-width: 640px) {
      .gallery-masonry {
        grid-template-columns: repeat(2, 1fr);
        grid-auto-rows: 280px;
      }
    }
    @media (min-width: 1024px) {
      .gallery-masonry {
        grid-template-columns: repeat(3, 1fr);
        grid-auto-rows: 260px;
      }
      /* Make certain cards taller for asymmetric look */
      .gallery-masonry .product-card:nth-child(1) { grid-row: span 2; }
      .gallery-masonry .product-card:nth-child(5) { grid-row: span 2; }
      .gallery-masonry .product-card:nth-child(9) { grid-row: span 2; }
    }
    .gallery-masonry .product-card {
      display: block;
      overflow: hidden;
      height: 100%;
    }
    .gallery-masonry .product-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      transition: transform 0.6s ease;
    }
    .gallery-masonry .product-card:hover img {
      transform: scale(1.07);
    }

    /* Gold rule */
    .gold-rule {
      border: none;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c9a84c, transparent);
      margin: 1.5rem 0;
    }

    /* Timeline */
    .timeline-connector {
      flex: 1;
      height: 2px;
      background: repeating-linear-gradient(
        to left,
        #c9a84c 0px,
        #c9a84c 8px,
        transparent 8px,
        transparent 16px
      );
      margin-top: -1rem;
    }
    @media (max-width: 767px) {
      .timeline-connector {
        width: 2px;
        height: 3rem;
        margin-top: 0;
        margin-right: auto;
        margin-left: auto;
        background: repeating-linear-gradient(
          to bottom,
          #c9a84c 0px,
          #c9a84c 8px,
          transparent 8px,
          transparent 16px
        );
        flex: none;
      }
    }

    /* CTA section */
    .cta-section {
      background: linear-gradient(135deg, #0d0d0d 0%, #111111 50%, #0a0a0a 100%);
    }

    /* Form inputs */
    .form-input {
      width: 100%;
      background: rgba(240, 236, 228, 0.05);
      border: 1px solid rgba(201, 168, 76, 0.25);
      color: #f0ece4;
      padding: 0.875rem 1rem;
      font-family: 'Heebo', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.3s ease, background 0.3s ease;
      outline: none;
    }
    .form-input:focus {
      border-color: #c9a84c;
      background: rgba(201, 168, 76, 0.08);
    }
    .form-input::placeholder {
      color: rgba(240, 236, 228, 0.35);
    }

    /* Smooth scroll */
    html { scroll-behavior: smooth; }

    /* Story section image */
    .story-image-container {
      position: relative;
      min-height: 400px;
    }
    .story-image-container::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(10,10,10,0.4) 0%, rgba(10,10,10,0.1) 100%);
      z-index: 1;
    }
    .story-image-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      inset: 0;
    }

    /* Hero text shadow */
    .hero-title-shadow {
      text-shadow: 0 0 60px rgba(201, 168, 76, 0.3), 0 2px 8px rgba(0,0,0,0.8);
    }

    /* WhatsApp button */
    .whatsapp-btn {
      background: #25D366;
      color: white;
      transition: background 0.3s ease, transform 0.2s ease;
    }
    .whatsapp-btn:hover {
      background: #1da851;
      transform: translateY(-2px);
    }

    /* Gold CTA button */
    .gold-btn {
      background: #c9a84c;
      color: #0a0a0a;
      transition: background 0.3s ease, transform 0.2s ease;
    }
    .gold-btn:hover {
      background: #e8d5a3;
      transform: translateY(-2px);
    }

    /* Hero CTA border button */
    .hero-cta {
      border: 1.5px solid #c9a84c;
      color: #c9a84c;
      background: transparent;
      font-family: 'Heebo', sans-serif;
      transition: background 0.35s ease, color 0.35s ease;
    }
    .hero-cta:hover {
      background: #c9a84c;
      color: #0a0a0a;
    }

    /* Nav links */
    .nav-link {
      color: rgba(240, 236, 228, 0.75);
      transition: color 0.2s ease;
      font-size: 0.9rem;
      font-weight: 400;
      cursor: pointer;
    }
    .nav-link:hover {
      color: #c9a84c;
    }

    /* Section spacing */
    section { position: relative; z-index: 1; }

    /* Vignette on hero */
    .hero-vignette {
      background: radial-gradient(ellipse at center, rgba(10,10,10,0) 40%, rgba(10,10,10,0.8) 100%);
    }
  </style>
</head>

    tailwind.config = {

        extend: {

            'luxury-black': '#0a0a0a',

        }

    function GoldOrbs() {

      return (
        <div style={{ position: 'fixed', inset: 0, zIndex: 0, pointerEvents: 'none', overflow: 'hidden' }}>

                animation: o.anim,
              }}
            />
          ))}
        </div>
      );
    }

            ))}
          </button>
        </nav>
      );
    }

    // ─── Hero Section ────────────────────────────────────────────────────────
    function Hero() {
      return (

                animation: 'pulse 2s ease-in-out infinite'
              }} />
            </div>
          </div>
        </section>
      );
    }

                  onChange={e => setForm(f => ({ ...f, name: e.target.value }))}
                  required
                  style={{ direction: 'rtl' }}
                />
                <input
                  type="tel"
                  className="form-input"
                  placeholder="מספר טלפון"
                  value={form.phone}
                  onChange={e => setForm(f => ({ ...f, phone: e.target.value }))}
                  required
                  style={{ direction: 'rtl' }}
                />
              </div>
              <textarea
                className="form-input mb-6"
                placeholder="הודעה — ספרו לנו על הריהוט שחלמתם עליו"
                rows="5"
                value={form.message}
                onChange={e => setForm(f => ({ ...f, message: e.target.value }))}
                style={{ direction: 'rtl', resize: 'vertical' }}
              />
              <button
                type="submit"
                className="gold-btn px-12 py-4 font-bold text-base tracking-wider w-full md:w-auto"
                style={{ fontFamily: 'Heebo, sans-serif', letterSpacing: '0.06em', borderRadius: '2px' }}
              >
                שלח פנייה
              </button>
            </form>
          </div>
        </section>
      );
    }

    // ─── Footer ───────────────────────────────────────────────────────────────
    function Footer() {
      return (
        <footer style={{ background: '#060606', borderTop: '1px solid rgba(201,168,76,0.1)', zIndex: 1, position: 'relative' }}>
          <div className="max-w-7xl mx-auto px-4 md:px-8 py-12 flex flex-col md:flex-row items-center justify-between gap-6">
            <div>
              <div
                className="font-black text-xl mb-1"
                style={{ color: '#c9a84c', letterSpacing: '0.12em' }}
              >
                ארט-ווד
              </div>
              <div style={{ color: 'rgba(240,236,228,0.35)', fontSize: '0.78rem', fontWeight: 300 }}>
                ריהוט יוקרה ישראלי מאז 1999
              </div>
            </div>
            <div className="flex gap-8">
              {['קולקציה', 'הסיפור', 'תהליך', 'צור קשר'].map(link => (
                <span
                  key={link}
                  className="nav-link cursor-pointer"
                  style={{ fontSize: '0.82rem' }}
                >
                  {link}
                </span>
              ))}
            </div>
            <div style={{ color: 'rgba(240,236,228,0.25)', fontSize: '0.75rem', fontWeight: 300 }}>
              © 2024 ארט-ווד. כל הזכויות שמורות.
            </div>
          </div>
        </footer>
      );
    }

    // ─── Intersection Observer Hook ──────────────────────────────────────────
    function useScrollReveal() {
      useEffect(() => {
        const els = document.querySelectorAll('.fade-in');
        const observer = new IntersectionObserver(
          (entries) => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
          { threshold: 0.08, rootMargin: '0px 0px -20px 0px' }
        );
        els.forEach(el => observer.observe(el));
        // Immediately reveal elements already in viewport (Babel async timing gap)
        requestAnimationFrame(() => {
          els.forEach(el => {
            const r = el.getBoundingClientRect();
            if (r.top < window.innerHeight && r.bottom > 0) el.classList.add('visible');
          });
        });
        return () => observer.disconnect();
      }, []);
    }

    // ─── App ──────────────────────────────────────────────────────────────────
    function App() {
      useScrollReveal();

      return (
        <>
          <GoldOrbs />
          <Nav />
          <main>
            <Hero />
            <GallerySection />
            <BrandStory />
            <ProcessTimeline />
            <ContactSection />
          </main>
          <Footer />
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
